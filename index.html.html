<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Kodu Yapay Zeka Asistanı</title>

<style>
:root{
  --bg:#050914;
  --panel:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.12);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --blue:#38bdf8;
  --green:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(1px 1px at 20% 30%,#fff6,transparent),
    radial-gradient(1px 1px at 70% 60%,#fff5,transparent),
    linear-gradient(160deg,#020617,#0b1020);
  color:var(--text);
}
.app{max-width:680px;margin:auto;padding:14px}

/* === ADVANCED BANNER === */
.banner{
  position:relative;
  border-radius:22px;
  padding:26px 18px;
  background:
    linear-gradient(120deg,#020617,#020617),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 18px,
      rgba(56,189,248,.15) 20px
    );
  border:1px solid var(--line);
  overflow:hidden;
}
.banner::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%,#22d3ee44,transparent 40%),
    radial-gradient(circle at 80% 70%,#22c55e33,transparent 40%);
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(-40px)}
}
.banner h1{
  margin:0;
  font-size:22px;
  font-weight:700;
  background:linear-gradient(90deg,#7dd3fc,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}
.banner p{
  margin:6px 0 0;
  font-size:12px;
  color:var(--muted);
}

/* SEARCH */
.search{
  margin-top:14px;
  position:relative;
}
.search input{
  width:100%;
  padding:16px 16px 16px 46px;
  border-radius:16px;
  background:#0007;
  border:1px solid var(--line);
  color:#fff;
  font-size:16px;
  box-shadow:0 0 24px #38bdf833;
}
.search::before{
  content:"🔍";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
}

/* TABS */
.tabs{
  display:flex;
  gap:6px;
  margin:14px 0;
}
.tab{
  flex:1;
  text-align:center;
  font-size:12px;
  padding:10px 6px;
  color:var(--muted);
  cursor:pointer;
}
.tab.active{
  color:var(--blue);
  border-bottom:3px solid var(--blue);
}

/* LIST */
.list{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:22px;
  padding:12px;
  max-height:65vh;
  overflow:auto;
}

/* CARD */
.card{
  position:relative;
  background:#0006;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}
.card.exact{
  background:
    radial-gradient(120% 120% at top left,#22c55e55,transparent),
    #0009;
  border-color:var(--green);
  box-shadow:0 0 40px #22c55e99;
}
.code{
  font-size:18px;
  font-weight:700;
}
.card.exact .code{
  font-size:32px;
  color:var(--green);
}
.name{
  font-size:13px;
  color:var(--muted);
}
.card.exact .name{
  font-size:18px;
  color:#dcfce7;
}
.badge{
  position:absolute;
  top:12px;
  right:12px;
  font-size:11px;
  padding:6px 10px;
  border-radius:999px;
  background:#2563eb33;
  color:#93c5fd;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:11px;
  color:#6b7280;
  margin-top:14px;
}
.hidden{display:none}
</style>
</head>

<script>
const PRIORITY={AMBALAJ:1,YRDMALZM:2,HAMMADDE:3,MAMUL:4};

const raw=document.getElementById("rawData").value.trim();
let stocks=raw.split("\n").map(l=>{
  const p=l.split("\t");
  return{grup:p[0],code:p[1],name:p.slice(2).join(" ")};
});

/* DEDUP */
const map={};
stocks.forEach(s=>{
  if(!map[s.code]||PRIORITY[s.grup]<PRIORITY[map[s.code].grup]){
    map[s.code]=s;
  }
});
stocks=Object.values(map);

const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ı/g,"i");

const input=document.getElementById("search");
const list=document.getElementById("list");
const tabs=document.querySelectorAll(".tab");
let activeTab="ALL";
let lastVib=null;

tabs.forEach(t=>{
  t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    activeTab=t.dataset.tab;
    render();
  };
});

function score(s,q){
  q=norm(q);
  if(norm(s.code)===q||norm(s.name)===q) return 100;
  if(norm(s.code).startsWith(q)||norm(s.name).startsWith(q)) return 80;
  if(norm(s.code).includes(q)||norm(s.name).includes(q)) return 50;
  return 0;
}

function vibrate(code){
  if(code===lastVib) return;
  lastVib=code;
  navigator.vibrate?.([200,80,200,80,300]);
}

function render(){
  const q=input.value.trim();
  list.innerHTML="";
  if(!q){lastVib=null;return;}

  stocks
    .map(s=>({...s,score:score(s,q)}))
    .filter(s=>s.score>0)
    .filter(s=>{
      if(activeTab==="ALL") return true;
      if(activeTab==="AMBALAJ") return s.grup==="AMBALAJ"||s.grup==="YRDMALZM";
      return s.grup===activeTab;
    })
    .sort((a,b)=>b.score-a.score)
    .forEach((s,i)=>{
      const exact=s.score>=95;
      const c=document.createElement("div");
      c.className="card"+(exact?" exact":"");
      c.innerHTML=`
        <span class="badge">${s.grup}</span>
        <div class="code">${s.code}</div>
        <div class="name">${s.name}</div>`;
      list.appendChild(c);
      if(i===0&&exact) vibrate(s.code);
    });
}

input.addEventListener("input",render);
</script>
